name: Refresh data

# Fetches the latest Data.go.kr figures and commits them as static JSON.
# GitHub Pages (source: main /docs) redeploys automatically on the commit.

on:
  schedule:
    # Weekly, Monday 07:00 KST (= Sunday 22:00 UTC).
    - cron: "0 22 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "."
      DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        run: python scripts/ingest.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Refresh open data ($(date -u +%Y-%m-%d))"
            git push
          fi
