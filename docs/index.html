<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Korea open-data viewer — deer-velvet trade</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🦌</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Korea open-data viewer</h1>
    <p>Trade and safety data from Korea's public data portal (data.go.kr), in plain English.</p>
    <div class="updated" id="updated">Loading…</div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main>
    <div class="controls" id="controls"></div>
    <p class="rowcount" id="rowcount"></p>

    <div id="tableView">
      <div class="table-wrap">
        <table id="table">
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p class="note" id="note"></p>
    </div>

    <div id="chartView" class="chart-wrap hidden">
      <div class="controls" id="chartControls" style="margin:0 0 12px;"></div>
      <div class="chart-canvas-box"><canvas id="chart"></canvas></div>
    </div>
  </main>

  <script src="vendor/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
