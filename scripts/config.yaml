# Ingest configuration for the Korea open-data viewer.
# Edit this file to change what data is fetched. No code change needed.
# The service key is NEVER stored here — it is read from the DATA_GO_KR_KEY
# environment variable (GitHub Secret) at run time.

# ---------------------------------------------------------------------------
# Dataset 1 — Korea Customs: item / country trade (the star dataset)
# ---------------------------------------------------------------------------
customs:
  enabled: true
  base_url: "https://apis.data.go.kr/1220000/nitemtrade/getNitemtradeList"
  # Deer-velvet HS codes. Add more codes here to widen coverage.
  hs_codes:
    "0507901110": "Deer velvet — whole stick / frozen"
    "0507901190": "Deer velvet — sliced / dried"
  # Countries to pull. cntyCd is a mandatory 2-letter code on this API, so we
  # loop over this list. Value is the English name shown in the viewer.
  countries:
    NZ: "New Zealand"
    RU: "Russia"
    CN: "China"
    HK: "Hong Kong"
    US: "United States"
    AU: "Australia"
    CA: "Canada"
    MN: "Mongolia"
    KZ: "Kazakhstan"
  # Inclusive year range. The API allows a maximum 1-year span per call, so the
  # ingest loops year by year automatically.
  start_year: 2016
  end_year: 2026

# ---------------------------------------------------------------------------
# Dataset 2 — MFDS: medicine production & import performance
# Field names + any required parameters are confirmed from the first live run
# (the portal blocks automated spec reads). The ingest parses every field
# returned, so it works even before the labels below are complete.
# ---------------------------------------------------------------------------
medicine:
  enabled: true
  base_url: "https://apis.data.go.kr/1471000/MdcinPrdctnImportAcmsltService02/getMdcinPrdctnImportrstList02"
  num_of_rows: 100
  max_rows: 5000          # safety cap on JSON size; raise once fields are known
  extra_params: {}        # add e.g. {Prdlst_YEAR: "2024"} here if the API requires it

# ---------------------------------------------------------------------------
# Dataset 3 — MFDS/NIFDS: national herbal-resource sensory-inspection failures
# ---------------------------------------------------------------------------
herbal_inspection:
  enabled: true
  base_url: "https://apis.data.go.kr/1471057/NatnHbstRsrcFuncInspIncgCaseService"
  # Operation name is discovered at run time (see ingest.py candidate list).
  operation: ""           # set explicitly once confirmed, e.g. "getNatnHbstRsrcFuncInspIncgCaseList"
  num_of_rows: 100
  max_rows: 3000
  extra_params: {}

# ---------------------------------------------------------------------------
# English (British spelling, ESL) labels for known field codes. Any field not
# listed here falls back to a tidied version of its raw name in the viewer.
# ---------------------------------------------------------------------------
labels:
  # Customs (normalised by ingest)
  period: "Period"
  country_code: "Country code"
  country: "Country"
  hs_code: "HS code"
  item: "Item"
  import_weight_kg: "Import weight (kg)"
  import_value_usd: "Import value (US$)"
  export_weight_kg: "Export weight (kg)"
  export_value_usd: "Export value (US$)"
